name: Bug Report
description: Report a bug to help us improve Aureum
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Description
        A clear and concise description of what the bug is.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device & OS
      description: "e.g., Samsung Galaxy S24, Android 14"
      placeholder: Device model and Android version

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: "e.g., 1.0.0"
      placeholder: App version from Play Store or APK

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: Attach screenshots or a screen recording if available
      placeholder: Attach files or paste links here

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant logcat output or error messages
      placeholder: Paste log output here...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and found no duplicates
          required: true
        - label: I am using the latest version of the app
          required: true