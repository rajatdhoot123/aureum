name: Feature Request
description: Suggest a new feature or enhancement for Aureum
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        Describe the feature you'd like to see in Aureum.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who would benefit from it?
      placeholder: |
        As an Indian investor tracking gold prices...
        I want to be able to...
        So that...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Describe the ideal experience.
      placeholder: Describe the feature and how it should work

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered?
      placeholder: List any alternative solutions or workarounds

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and found no duplicates
          required: true
        - label: This is a new feature, not a duplicate of an existing request
          required: true